<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Notes Tracker</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="main-header">
            <div class="logo-area">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2005/Atom">
                    <path d="M12 2L2 7l10 5 10-5-10-5z" fill="url(#gradient-accent)" />
                    <path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    <defs>
                        <linearGradient id="gradient-accent" x1="2" y1="2" x2="22" y2="12" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#00f2fe" />
                            <stop offset="1" stop-color="#4facfe" />
                        </linearGradient>
                    </defs>
                </svg>
                <div class="logo-text">
                    <h1>BigQuery</h1>
                    <span class="subtitle">Release Notes Dashboard</span>
                </div>
            </div>
            <div class="header-actions">
                <span id="last-updated-time" class="timestamp-label">Last synced: Never</span>
                <button id="refresh-btn" class="btn btn-primary" title="Refresh Release Notes">
                    <svg class="icon btn-icon" id="refresh-spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
                    </svg>
                    <span>Sync Feed</span>
                </button>
            </div>
        </header>

        <!-- Stats Panel -->
        <section class="stats-grid">
            <div class="stat-card total-stat">
                <div class="stat-info">
                    <span class="stat-title">Total Updates</span>
                    <span id="stat-total" class="stat-value">0</span>
                </div>
                <div class="stat-icon-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                </div>
            </div>
            <div class="stat-card feature-stat">
                <div class="stat-info">
                    <span class="stat-title">Features</span>
                    <span id="stat-features" class="stat-value">0</span>
                </div>
                <div class="stat-icon-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                </div>
            </div>
            <div class="stat-card issue-stat">
                <div class="stat-info">
                    <span class="stat-title">Issues</span>
                    <span id="stat-issues" class="stat-value">0</span>
                </div>
                <div class="stat-icon-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                </div>
            </div>
            <div class="stat-card deprecation-stat">
                <div class="stat-info">
                    <span class="stat-title">Deprecations</span>
                    <span id="stat-deprecations" class="stat-value">0</span>
                </div>
                <div class="stat-icon-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                </div>
            </div>
        </section>

        <!-- Main Workspace: Controls & Release List -->
        <main class="dashboard-body">
            <aside class="control-panel">
                <div class="panel-section">
                    <h3>Search Release Notes</h3>
                    <div class="search-box">
                        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" id="search-input" placeholder="Filter by text, tag, date...">
                    </div>
                </div>

                <div class="panel-section">
                    <h3>Category Filters</h3>
                    <div class="filter-categories" id="filter-categories-container">
                        <button class="filter-pill active" data-type="all">All Releases</button>
                        <!-- Dynamic filter pills will be generated here -->
                    </div>
                </div>

                <div class="panel-section">
                    <h3>Sort Order</h3>
                    <div class="sort-selector">
                        <select id="sort-select" class="form-select">
                            <option value="newest">Newest First</option>
                            <option value="oldest">Oldest First</option>
                            <option value="category">Group by Category</option>
                        </select>
                    </div>
                </div>
            </aside>

            <!-- Release List Section -->
            <section class="release-list-container">
                <div id="release-loading" class="loading-state hidden">
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                </div>

                <div id="release-error" class="error-state hidden">
                    <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    <p id="error-message">Failed to load release notes. Please try again.</p>
                    <button id="retry-btn" class="btn btn-secondary">Retry Sync</button>
                </div>

                <div id="release-empty" class="empty-state hidden">
                    <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                    <p>No release notes found matching your filters.</p>
                </div>

                <div id="release-list" class="release-list">
                    <!-- Release cards will be rendered dynamically here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Tweet Composer Modal -->
    <div id="tweet-modal" class="modal-overlay hidden">
        <div class="modal-container">
            <div class="modal-header">
                <h2>Draft a Tweet</h2>
                <button class="modal-close-btn" id="close-modal-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="preview-panel">
                    <div class="preview-title-bar">
                        <span class="preview-badge" id="modal-update-badge">Feature</span>
                        <span class="preview-date" id="modal-update-date">June 15, 2026</span>
                    </div>
                    <div class="preview-content" id="modal-update-content">
                        <!-- Original HTML snippet rendered here -->
                    </div>
                </div>
                
                <div class="composer-panel">
                    <div class="form-group">
                        <label for="tweet-template">Select Tweet Style</label>
                        <select id="tweet-template" class="form-select">
                            <option value="announcement">📢 Announcement Alert</option>
                            <option value="spotlight">💡 Feature Spotlight</option>
                            <option value="minimal">🔗 Tech Link & Summary</option>
                            <option value="custom">✍️ Custom Draft</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="tweet-textarea">Compose Message</label>
                        <textarea id="tweet-textarea" rows="6" maxlength="280" placeholder="What's happening?"></textarea>
                    </div>

                    <div class="composer-footer">
                        <div class="char-count-wrapper">
                            <div class="progress-ring-container">
                                <svg class="progress-ring" width="36" height="36">
                                    <circle class="progress-ring__circle-bg" stroke="rgba(255,255,255,0.1)" stroke-width="3" fill="transparent" r="14" cx="18" cy="18"/>
                                    <circle class="progress-ring__circle" id="char-progress-circle" stroke="#00f2fe" stroke-width="3" fill="transparent" r="14" cx="18" cy="18"/>
                                </svg>
                                <span id="char-count" class="char-count">280</span>
                            </div>
                        </div>
                        <button id="send-tweet-btn" class="btn btn-tweet">
                            <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                            </svg>
                            <span>Share on X</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/static/app.js"></script>
</body>
</html>
